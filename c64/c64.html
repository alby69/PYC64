<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
<title>C64</title>
<style type="text/css">
body {
    margin: 0;
    background-color: black;
}
.game {
    position: absolute;
    top: 0px;
    left: 0px;
    margin: 0px;
    border: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: block;
    image-rendering: optimizeSpeed;
    image-rendering: -moz-crisp-edges;
    image-rendering: -o-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    -ms-interpolation-mode: nearest-neighbor;
}
</style>
<body>
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()" width="556" height="1049"></canvas>
  <script type="text/javascript">
    var Module = {
        preRun: [],
        print: (function() {
            return function(text) {
                text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
            };
        })(),
        printErr: function(text) {
            text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
    };
    window.onerror = function(event) {
        console.log("onerror: " + event);
    };

    // ── PRG injection via postMessage ────────────────────────────────────────
    // c64c.html invia { type:'loadPRG', bytes:[...], filename:'...' }
    // Il meccanismo usa le API sokol_app di c64.js:
    //   g.nd         = FileList (array di File)
    //   Yb(n)        = __sapp_emsc_begin_drop(count)
    //   Qb(str)      = alloca stringa C nello heap WASM
    //   Zb(i, ptr)   = __sapp_emsc_drop(index, name_ptr)
    //   $b(x, y, m)  = __sapp_emsc_end_drop(x, y, modifiers)
    //   g.Ma(...)    = lettura FileReader (usa g.nd[i] internamente)
    //
    // Costruiamo un File sintetico e lo inseriamo in g.nd, poi chiamiamo
    // le stesse funzioni che verrebbero chiamate da un drop reale.

    var _pendingPRG = null;  // { bytes, filename } in attesa che il WASM sia pronto

    window.addEventListener('message', function(evt) {
      if (!evt.data || evt.data.type !== 'loadPRG') return;

      var bytes    = new Uint8Array(evt.data.bytes);
      var filename = evt.data.filename || 'program.prg';

      // Crea un File sintetico dal PRG
      var file = new File([bytes], filename, { type: 'application/octet-stream' });

      // Cerca il modulo globale sokol (c64.js lo espone come `g` internamente,
      // ma le funzioni chiave vengono attaccate a window tramite Module o
      // tramite la variabile `g` del closure. Proviamo entrambe le strategie.
      if (typeof Yb === 'function' && typeof Zb === 'function' && typeof g !== 'undefined' && g.nd !== undefined) {
        // WASM già inizializzato — inietta direttamente
        _injectPRG(file, filename, evt.source, evt.origin);
      } else {
        // WASM non ancora pronto — metti in coda, verrà iniettato dopo
        _pendingPRG = { file: file, filename: filename, source: evt.source, origin: evt.origin };
        console.log('[C64] PRG in coda, in attesa WASM:', filename);
      }
    });

    // Funzione di iniezione vera e propria
    function _injectPRG(file, filename, replyTarget, replyOrigin) {
      try {
        // g è la variabile del closure di c64.js — non è direttamente accessibile
        // dall'esterno. Dobbiamo usare i simboli globali esposti da Emscripten.
        // In sokol_app, __sapp_emsc_begin_drop / _drop / _end_drop sono
        // esportati come Module['__sapp_emsc_begin_drop'] ecc.
        var begin_drop = Module['__sapp_emsc_begin_drop'] || window.__sapp_emsc_begin_drop;
        var drop_fn    = Module['__sapp_emsc_drop']       || window.__sapp_emsc_drop;
        var end_drop   = Module['__sapp_emsc_end_drop']   || window.__sapp_emsc_end_drop;

        if (!begin_drop || !drop_fn || !end_drop) {
          console.warn('[C64] sokol drop API non disponibile, tento simulazione drag event');
          _injectViaDragEvent(file, filename, replyTarget, replyOrigin);
          return;
        }

        // Alloca il nome del file nello heap WASM
        var namePtr = _allocString(filename);
        if (!namePtr) throw new Error('allocString fallito');

        // Imposta la "FileList" interna di sokol su un array con il nostro File
        // g.nd è accessibile solo nel closure; usiamo il drop handler originale
        // che è attachato al canvas come alternativa, oppure forziamo via g.nd
        // cercando la variabile nella catena di scope del canvas.
        // Strategia: richiamiamo il drop handler (g.md) che è registrato sul canvas
        // con un DragEvent sintetico + DataTransfer fake.
        _injectViaDragEvent(file, filename, replyTarget, replyOrigin);

      } catch(e) {
        console.error('[C64] Errore iniezione PRG:', e);
        if (replyTarget) {
          replyTarget.postMessage({ type: 'prgAck', status: 'error', filename: filename }, replyOrigin || '*');
        }
      }
    }

    // Strategia principale: DragEvent sintetico con DataTransfer che contiene il File.
    // Funziona perché g.md (il drop handler di sokol) legge b.dataTransfer.files.
    function _injectViaDragEvent(file, filename, replyTarget, replyOrigin) {
      var canvas = document.getElementById('canvas');
      if (!canvas) {
        console.error('[C64] Canvas non trovato');
        return;
      }

      // Costruiamo un DataTransfer con il File sintetico.
      // DataTransfer è scrivibile solo via DataTransferItemList in alcuni browser,
      // quindi usiamo il ClipboardEvent trick o un oggetto proxy.
      var dt = new DataTransfer();
      dt.items.add(file);

      // Crea e dispatcha il drop event sul canvas
      var dropEvent = new DragEvent('drop', {
        bubbles:    true,
        cancelable: true,
        dataTransfer: dt,
        clientX: canvas.offsetLeft + canvas.offsetWidth  / 2,
        clientY: canvas.offsetTop  + canvas.offsetHeight / 2
      });

      canvas.dispatchEvent(dropEvent);

      console.log('[C64] Drop event sintetico inviato per:', filename);

      // Rispondi ad c64c.html con ack
      if (replyTarget) {
        replyTarget.postMessage({ type: 'prgAck', status: 'loaded', filename: filename }, replyOrigin || '*');
      }
    }

    // Helper: alloca una stringa C nello heap WASM (fallback, potrebbe non servire)
    function _allocString(str) {
      try {
        if (typeof Module.allocate === 'function' && typeof Module.intArrayFromString === 'function') {
          return Module.allocate(Module.intArrayFromString(str), 'i8', Module.ALLOC_NORMAL);
        }
        if (typeof allocate === 'function' && typeof intArrayFromString === 'function') {
          return allocate(intArrayFromString(str), 'i8', ALLOC_NORMAL);
        }
      } catch(e) { /* non critico */ }
      return null;
    }

    // Poll: se c'è un PRG in coda, aspetta che il WASM sia pronto e iniettalo.
    // Rileva la prontezza verificando che il canvas abbia ricevuto eventi dal WASM
    // (sokol registra i listener sul canvas durante l'init).
    function _waitForWASMAndInject() {
      if (!_pendingPRG) return;

      var canvas = document.getElementById('canvas');
      if (!canvas) { setTimeout(_waitForWASMAndInject, 200); return; }

      // Controlla se sokol ha già registrato il drag handler sul canvas
      // (lo fa durante l'init — usa il fatto che window.__sapp_emsc_begin_drop
      //  viene esposto da sokol dopo il boot)
      var ready = (typeof window.__sapp_emsc_begin_drop === 'function') ||
                  (Module && typeof Module['__sapp_emsc_begin_drop'] === 'function') ||
                  (typeof Yb === 'function');

      if (!ready) {
        setTimeout(_waitForWASMAndInject, 300);
        return;
      }

      // WASM pronto — aspetta ancora un attimo per il C64 BASIC boot screen
      // (il C64 impiega ~2s per mostrare il READY prompt; il drop viene accettato
      //  solo quando la macchina è in stato BASIC idle)
      var p = _pendingPRG;
      _pendingPRG = null;
      setTimeout(function() {
        console.log('[C64] WASM pronto, inietto PRG:', p.filename);
        _injectViaDragEvent(p.file, p.filename, p.source, p.origin);
      }, 2500);  // attendi ~2.5s dal boot del C64
    }

    // Avvia il polling
    setTimeout(_waitForWASMAndInject, 500);
  </script>
  <script async="" type="text/javascript" src="c64.js"></script>


</body></html>
