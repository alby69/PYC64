services:
  # ── TUI + Motore (comando principale) ──
  pyc64:
    build: .
    container_name: pyc64
    stdin_open: true
    tty: true
    working_dir: /app
    environment:
      - TERM=${TERM:-xterm-256color}
    volumes:
      - ./pyc64c:/app/pyc64c:ro
      - ./pyc64_ui:/app/pyc64_ui:ro
      - .:/app/source:ro
      - ./output:/app/output
    command: python3 -m pyc64_ui.app /app/source/test_python.c64

  # ── Solo compilazione batch ──
  compile:
    build: .
    container_name: pyc64-compile
    working_dir: /app
    volumes:
      - .:/app/source:ro
      - ./output:/app/output
    command: python3 -c "
      from pyc64c.compiler import compile_to_prg;
      import sys;
      src = sys.argv[1] if len(sys.argv) > 1 else '/app/source/test_python.c64';
      with open(src) as f: s = f.read();
      prg, res = compile_to_prg(s);
      if prg:
        p = src.rsplit('/', 1)[-1];
        p = '/app/output/' + p.rsplit('.', 1)[0] + '.prg';
        with open(p, 'wb') as f: f.write(prg);
        print(f'OK: {p}  ({len(prg)} bytes)');
      else:
        print('Errors:', res.lex_errors + res.parse_errors + (res.builder.fixup_errs if res.builder else []))
      "

  # ── Assembla .asm ──
  asm:
    build: .
    container_name: pyc64-asm
    working_dir: /app
    volumes:
      - .:/app/source:ro
      - ./output:/app/output
    entrypoint: ["python3", "/app/asm6502.py"]
    command: ["/app/source/examples/hello.asm", "-o", "/app/output/hello.prg", "-l"]

  # ── Emulatore VICE (opzionale) ──
  vice:
    image: python:3.12-slim
    container_name: vice64
    stdin_open: true
    tty: true
    volumes:
      - ./output:/app/output
    command: bash -c "
      apt-get update && apt-get install -y vice &&
      echo 'Esegui: x64 /app/output/test_python.prg' &&
      tail -f /dev/null
      "
    profiles:
      - dont-start
